name: "发布桌面端"
on:
  push:
    branches:
      - main  # 或者是你的主分支名称，比如 master

jobs:
  publish:
    permissions:
      contents: write # 必须开启写入权限，否则无法创建 Release
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # 第一步：安装 pnpm 环境，因为你的项目里有 pnpm-lock.yaml
      - name: 安装 pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      # 第二步：安装项目依赖
      - name: 安装依赖
        run: pnpm install

      # 第三步：运行 Tauri 打包动作
      - name: 构建并在 GitHub Release 发布
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # 会自动抓取 package.json 里的版本号
          releaseName: "国史科举 v__VERSION__"
          releaseBody: "由 GitHub Actions 自动构建"
          releaseDraft: true # 打包完成后会先存为草稿，你可以去手动发布
          prerelease: false
